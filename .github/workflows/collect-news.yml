name: Collect News (Naver)

on:
  schedule:
    # 평일 09:00 KST (= UTC 00:00) — 장 시작 전 뉴스 수집
    - cron: "0 0 * * 1-5"
  workflow_dispatch:
    inputs:
      display:
        description: "종목당 수집할 뉴스 건수 (기본: 20, 최대: 100)"
        required: false

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install -r requirements.txt

      - name: Run Naver News collector
        run: |
          ARGS=""
          if [ -n "${{ github.event.inputs.display }}" ]; then
            ARGS="--display ${{ github.event.inputs.display }}"
          fi
          python scripts/collect_news.py $ARGS
        env:
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
