name: Collect Macro Indices (FRED)

on:
  schedule:
    # 평일 01:00 UTC — 미국 장 마감 후(21:00 ET = 02:00 UTC) 직전에 전날 값 수집
    # FRED는 보통 당일 21:00 ET 이후에 VIX 업데이트
    - cron: "0 1 * * 2-6"
  workflow_dispatch: {}

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install -r requirements.txt

      - run: python scripts/collect_macro_indices.py
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
