name: Collect Financials (DART)

on:
  schedule:
    # 매주 월요일 09:00 KST (= UTC 00:00) — 분기 보고서 공시 후 갱신
    - cron: "0 0 * * 1"
  workflow_dispatch:
    inputs:
      year:
        description: "수집 연도 (기본: 스크립트 자동 계산)"
        required: false
      quarter:
        description: "분기 1/2/3/4 (생략 시 연간 사업보고서)"
        required: false

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install -r requirements.txt

      - name: Run DART financial collector
        run: |
          ARGS=""
          if [ -n "${{ github.event.inputs.year }}" ]; then
            ARGS="$ARGS --year ${{ github.event.inputs.year }}"
          fi
          if [ -n "${{ github.event.inputs.quarter }}" ]; then
            ARGS="$ARGS --quarter ${{ github.event.inputs.quarter }}"
          fi
          python scripts/collect_financials.py $ARGS
        env:
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
