name: Collect Overseas Prices

on:
  schedule:
    # UTC 기준 13:30~21:00 = 미국 동부시간 장중 근사치, 15분 간격
    # (정확한 장 시작/마감과는 다를 수 있어 추후 다듬어도 됨)
    - cron: "*/15 13-21 * * 1-5"
  workflow_dispatch: {}  # Actions 탭에서 수동 실행도 가능하게

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install -r requirements.txt

      - run: python scripts/collect_overseas_prices.py
        env:
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
